name: Harness Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  harness-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run harness CI guard profile
        run: node .agents/scripts/guard-runner.mjs ci
