runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 4
  concurrency: 80

env:
  - variable: APP_PROFILE
    value: prod
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PUBLIC_CONFIG
    secret: firebase-public-config
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SUPABASE_PUBLIC_CONFIG
    secret: supabase-public-config
    availability:
      - BUILD
      - RUNTIME
    # JSON shape consumed by src/config/app.config.ts:
    # {"url":"https://<project>.supabase.co","publishableKey":"<publishable-key>"}
    # Local/dev may use the equivalent split vars:
    # NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY.

  - variable: NEXT_PUBLIC_DEFAULT_CLUB_ID
    value: 00000000-0000-0000-0000-000000000001
    availability:
      - BUILD
      - RUNTIME

  - variable: SUPABASE_SECRET_KEY
    secret: supabase-secret-key
    availability:
      - RUNTIME

  - variable: KAKAO_OAUTH_CONFIG
    secret: kakao-oauth-config
    availability:
      - RUNTIME
