<svg width="800" height="800" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Chzzk-themed minimalist silhouette avatar -->
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141624"/>
      <stop offset="100%" stop-color="#0a0d17"/>
    </linearGradient>
    <linearGradient id="neon-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffa3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00b872" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#00ffa3" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00ffa3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg-grad)" stroke="#25283e" stroke-width="1.5"/>

  <!-- Subtle glow behind head -->
  <circle cx="32" cy="32" r="24" fill="url(#glow)"/>

  <!-- Head silhouette -->
  <circle cx="32" cy="24" r="10" fill="#25283e" stroke="url(#neon-grad)" stroke-width="1"/>

  <!-- Body/shoulders silhouette -->
  <path d="M16 54 C16 42 22 36 32 36 C42 36 48 42 48 54" fill="#25283e" stroke="url(#neon-grad)" stroke-width="1"/>

  <!-- Jersey number area hint -->
  <text x="32" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="900" fill="#00ffa3" opacity="0.5">FC</text>
</svg>